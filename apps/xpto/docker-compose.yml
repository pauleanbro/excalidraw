version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: xpto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xpto
      POSTGRES_USER: xpto
      POSTGRES_PASSWORD: xpto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xpto -d xpto"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
